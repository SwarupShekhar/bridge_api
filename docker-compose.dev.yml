version: '3.8'

services:
  # Development Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:171199@postgres:5432/bridge_API_DB_dev
      - PULSE_INTERNAL_URL=http://localhost:3001
      - CORE_INTERNAL_URL=http://localhost:3002
      - INTERNAL_SECRET=swarupshekhar171199
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bridge-dev-network
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run start:dev

  # PostgreSQL Database for Development
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bridge_API_DB_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 171199
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - bridge-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for development
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - bridge-dev-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  bridge-dev-network:
    driver: bridge
